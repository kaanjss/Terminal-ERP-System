<!doctype html>
<html lang="{{ lang }}" dir="{{layout_direction}}">

<head>
  <meta charset="UTF-8" />
  <!-- Chrome, Firefox OS and Opera -->
  <meta name="theme-color" content="#0089FF">
  <!-- Windows Phone -->
  <meta name="msapplication-navbutton-color" content="#0089FF">
  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-status-bar-style" content="#0089FF">
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
  <meta content="utf-8" http-equiv="encoding">
  <meta name="author" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="shortcut icon" href="{{ favicon or ' /assets/terminal_erp/images/terminal_erp-favicon.svg' }}" type="image/x-icon">
  <link rel="icon" href="{{ favicon or ' /assets/terminal_erp/images/terminal_erp-favicon.svg' }}" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banking | {{ app_name }}</title>
</head>

<body>
  <div id="root"></div>
  <script>window.csrf_token = '{{ terminal_framework.session.csrf_token }}';
    if (!window.terminal_framework) window.terminal_framework = {};

    terminal_framework.boot = JSON.parse({{ boot }});
    terminal_framework.boot.layout_direction = "{{ layout_direction }}";

    terminal_framework._translations_loaded = fetch(
      `/api/method/terminal_framework.translate.get_boot_translations?v=${terminal_framework.boot.translations_version}&lang=${terminal_framework.boot.lang}`,
      {
        credentials: "same-origin",
        headers: {
          "X-Terminal Framework-CSRF-Token": terminal_framework.csrf_token,
          "Accept": "application/json"
        }
      }
    ).then(r => r.json()).then(data => {
      terminal_framework._messages = data.message || {};
    }).catch(() => { });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
